name: Claude PR Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write
  issues: write

concurrency:
  group: claude-review-${{ github.ref }}
  cancel-in-progress: true

jobs:
  claude-review:
    name: Claude PR Review
    runs-on: ubuntu-latest
    if: github.event.pull_request.head.repo.full_name == github.repository
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          claude_args: '--model claude-opus-4-7 --max-turns 5'
          prompt: |
            Ти — senior full-stack розробник, який робить code review цього PR.

            Звіряйся з CLAUDE.md та docs/PRD.md (якщо існує) при кожному рев'ю.

            Що шукати:
            - Порушення архітектурних шарів (src/lib імпортує компоненти, src/components імпортує src/app тощо)
            - Type holes: any, ts-ignore, ts-expect-error без обґрунтування, unsafe type assertions
            - Race conditions та missing useEffect deps
            - Невідповідність бізнес-логіки до PRD (якщо docs/PRD.md існує)
            - Тести без edge cases (тільки happy path)
            - localStorage / sessionStorage (заборонено — дані тільки в пам'яті)
            - PII у логах або коді (заборонено зберігати ПІБ)
            - Accessibility проблеми (відсутні aria-label, alt тощо)
            - Дублювання коду
            - Функції довші за 50 рядків
            - Відсутні JSDoc на публічних API
            - Coverage < 80%

            Перевіряти:
            - Чи оновлено PRD/CLAUDE.md якщо змінилися вимоги
            - Conventional Commits для всіх комітів у PR

            Формат відповіді:
            1. **Summary** — одне речення про зміни
            2. **Blocker issues** — те що ТРЕБА виправити перед merge
            3. **Recommendations** — важливі але не блокуючі
            4. **Optional improvements** — дрібниці на майбутнє

            Не хвали. Тільки конкретні зауваги.
            Якщо все добре — коротке LGTM + 1-2 покращення на майбутнє.
            Мова: українська для product context, англійська для код-фрагментів.
            Безпека: перевіряй валідацію вводу та відсутність витоків даних.
